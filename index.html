<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}
body{
    background:#0d1117;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:420px;
    text-align:center;
}
h2{
    margin-bottom:20px;
}
.progress{
    width:100%;
    height:18px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}
.bar{
    width:0%;
    height:100%;
    background:#2ea043;
    transition:.05s;
}
#percent{
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">
<h2>Please Wait...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="percent">0%</div>

</div>

<script>

let i=0;

let timer=setInterval(()=>{

i++;

document.getElementById("bar").style.width=i+"%";
document.getElementById("percent").innerHTML=i+"%";

if(i>=100){

clearInterval(timer);

window.location.replace("https://filedownload.cfd/");

}

},40);

</script>

</body>
</html>
